document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"zh-Hant\"><head>\n  \n  <meta charset=\"utf-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <title>股票 AI 助手 — 設計探索<\u002Ftitle>\n  <style>\n/* ── Design tokens ─────────────────────────────────────────── */\n:root {\n  /* Surfaces — true Bloomberg-Terminal-esque depth */\n  --bg-0: #07090d;          /* page */\n  --bg-1: #0d1118;          /* card */\n  --bg-2: #141923;          /* elevated card */\n  --bg-3: #1c2230;          /* inputs */\n  --bg-4: #262d3d;          /* hover */\n  --line: rgba(255,255,255,0.06);\n  --line-2: rgba(255,255,255,0.10);\n\n  /* Text */\n  --tx-1: #f5f7fa;\n  --tx-2: #b6bdc9;\n  --tx-3: #717786;\n  --tx-4: #4a4f5b;\n\n  /* TW market colors — 紅漲綠跌 */\n  --up:    #ff3b3b;\n  --up-bg: rgba(255,59,59,0.12);\n  --up-soft: #ff7a7a;\n  --dn:    #1bd97c;\n  --dn-bg: rgba(27,217,124,0.12);\n  --dn-soft:#5fe5a3;\n  --warn:  #ffb547;\n  --warn-bg: rgba(255,181,71,0.12);\n\n  /* Accent — user-tweakable */\n  --accent: #5b8dff;            /* default 藍 */\n  --accent-2: #82a8ff;\n  --accent-glow: rgba(91,141,255,0.35);\n  --accent-soft: rgba(91,141,255,0.14);\n\n  /* Type */\n  --font-sans: -apple-system, BlinkMacSystemFont, \"PingFang TC\", \"Noto Sans TC\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  --font-mono: \"JetBrains Mono\", \"SF Mono\", \"Menlo\", \"Consolas\", monospace;\n  --font-display: \"Helvetica Neue\", -apple-system, \"PingFang TC\", sans-serif;\n\n  /* Density */\n  --pad: 16px;\n  --pad-sm: 12px;\n  --gap: 12px;\n  --r: 14px;\n  --r-sm: 10px;\n  --r-lg: 20px;\n}\n\n[data-density=\"dense\"] {\n  --pad: 12px;\n  --pad-sm: 8px;\n  --gap: 8px;\n  --r: 10px;\n}\n\n[data-theme=\"light\"] {\n  --bg-0: #f4f5f7;\n  --bg-1: #ffffff;\n  --bg-2: #ffffff;\n  --bg-3: #eef0f4;\n  --bg-4: #e3e6ec;\n  --line: rgba(0,0,0,0.06);\n  --line-2: rgba(0,0,0,0.10);\n  --tx-1: #0a0e15;\n  --tx-2: #525866;\n  --tx-3: #8a90a0;\n  --tx-4: #b6bdc9;\n  --up-bg: rgba(255,59,59,0.10);\n  --dn-bg: rgba(27,180,90,0.12);\n  --dn: #16b367;\n}\n\n/* Accent presets */\n[data-accent=\"blue\"]   { --accent:#5b8dff; --accent-2:#82a8ff; --accent-glow:rgba(91,141,255,0.35); --accent-soft:rgba(91,141,255,0.14); }\n[data-accent=\"purple\"] { --accent:#a685ff; --accent-2:#bda2ff; --accent-glow:rgba(166,133,255,0.35); --accent-soft:rgba(166,133,255,0.14); }\n[data-accent=\"green\"]  { --accent:#3fd99a; --accent-2:#6fe6b5; --accent-glow:rgba(63,217,154,0.35); --accent-soft:rgba(63,217,154,0.14); }\n[data-accent=\"amber\"]  { --accent:#ffb547; --accent-2:#ffc878; --accent-glow:rgba(255,181,71,0.40); --accent-soft:rgba(255,181,71,0.14); }\n\n* { box-sizing: border-box; }\n\nhtml, body {\n  margin: 0;\n  background: var(--bg-0);\n  color: var(--tx-1);\n  font-family: var(--font-sans);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nbody { overflow-x: hidden; }\n\n/* ── Utility ── */\n.mono { font-family: var(--font-mono); font-feature-settings: \"tnum\"; }\n.tnum { font-variant-numeric: tabular-nums; font-feature-settings: \"tnum\"; }\n.up   { color: var(--up); }\n.dn   { color: var(--dn); }\n.muted { color: var(--tx-3); }\n.dim   { color: var(--tx-2); }\n\n/* ── Sparkline animation ── */\n@keyframes draw {\n  to { stroke-dashoffset: 0; }\n}\n.spark-path {\n  stroke-dasharray: 1000;\n  stroke-dashoffset: 1000;\n  animation: draw 1.6s ease-out forwards;\n}\n\n@keyframes pulse-dot {\n  0%,100% { opacity: 1; transform: scale(1); }\n  50%     { opacity: 0.4; transform: scale(0.85); }\n}\n.live-dot {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--up);\n  box-shadow: 0 0 8px var(--up);\n  animation: pulse-dot 1.6s ease-in-out infinite;\n}\n.live-dot.dn { background: var(--dn); box-shadow: 0 0 8px var(--dn); }\n.live-dot.accent { background: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }\n\n@keyframes fade-up {\n  from { opacity: 0; transform: translateY(8px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n.fade-up { animation: fade-up 0.5s ease-out backwards; }\n\n@keyframes shimmer-bg {\n  0%   { background-position: -200% 0; }\n  100% { background-position: 200% 0; }\n}\n.shimmer-text {\n  background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 30%, #fff 50%, var(--accent-2) 70%, var(--accent) 100%);\n  background-size: 200% 100%;\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  animation: shimmer-bg 4s linear infinite;\n}\n\n/* ── Phone scroll ── */\n.phone-scroll::-webkit-scrollbar { display: none; }\n.phone-scroll { -ms-overflow-style: none; scrollbar-width: none; }\n\n/* hide scrollbar generically */\n.no-scrollbar::-webkit-scrollbar { display: none; }\n.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }\n\n/* ── Dotted divider ── */\n.dotted {\n  background-image: radial-gradient(circle, var(--tx-4) 1px, transparent 1.5px);\n  background-size: 8px 1px;\n  background-repeat: repeat-x;\n  background-position: 0 50%;\n  height: 1px;\n  border: none;\n}\n\n/* ── Buttons ── */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  padding: 10px 16px; border-radius: 10px;\n  font-family: var(--font-sans); font-size: 14px; font-weight: 600;\n  border: 1px solid var(--line-2);\n  background: var(--bg-3); color: var(--tx-1);\n  cursor: pointer; transition: all 0.15s;\n}\n.btn:hover { background: var(--bg-4); }\n.btn-primary {\n  background: var(--accent); color: #fff; border-color: transparent;\n  box-shadow: 0 4px 16px var(--accent-glow);\n}\n.btn-primary:hover { background: var(--accent-2); }\n\n/* ── Glow card ── */\n.glow-card {\n  position: relative;\n  background: var(--bg-1);\n  border-radius: var(--r);\n  border: 1px solid var(--line);\n  overflow: hidden;\n}\n.glow-card::before {\n  content: \"\";\n  position: absolute; inset: 0;\n  background: radial-gradient(120% 60% at 50% -30%, var(--accent-soft), transparent 70%);\n  pointer-events: none;\n}\n\n/* ── Tag ── */\n.tag {\n  display: inline-flex; align-items: center; gap: 4px;\n  font-size: 11px; font-weight: 600; letter-spacing: 0.3px;\n  padding: 3px 7px; border-radius: 4px;\n  background: var(--bg-3); color: var(--tx-2);\n  font-family: var(--font-mono);\n  text-transform: uppercase;\n}\n.tag.up { background: var(--up-bg); color: var(--up); }\n.tag.dn { background: var(--dn-bg); color: var(--dn); }\n.tag.warn { background: var(--warn-bg); color: var(--warn); }\n.tag.accent { background: var(--accent-soft); color: var(--accent-2); }\n\n<\u002Fstyle>\n  <script src=\"8292d285-eeb1-4a03-9d79-d8e575912bc2\" integrity=\"sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L\" crossorigin=\"anonymous\"><\u002Fscript>\n  <script src=\"48b930e6-a021-4af1-b0a9-2abc0795d757\" integrity=\"sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm\" crossorigin=\"anonymous\"><\u002Fscript>\n  <style>\n    body {\n      background: #0a0c12;\n      min-height: 100vh;\n      padding: 40px 0 80px;\n    }\n    .canvas-root {\n      max-width: 100%;\n      padding: 0 32px;\n    }\n    .canvas-header {\n      max-width: 1400px;\n      margin: 0 auto 48px;\n      padding: 0 24px;\n    }\n    .canvas-header h1 {\n      font-size: 44px;\n      font-weight: 700;\n      margin: 0;\n      letter-spacing: -1px;\n      background: linear-gradient(135deg, var(--tx-1), var(--accent-2));\n      -webkit-background-clip: text;\n      background-clip: text;\n      color: transparent;\n    }\n    .canvas-header p {\n      color: var(--tx-2); margin: 8px 0 0;\n      font-size: 16px; line-height: 1.6; max-width: 720px;\n    }\n    .shelf-label {\n      font-family: var(--font-mono);\n      font-size: 11px;\n      color: var(--tx-3);\n      letter-spacing: 2px;\n      text-transform: uppercase;\n      margin-bottom: 20px;\n      display: flex;\n      align-items: center;\n      gap: 8px;\n    }\n    .shelf-label::before {\n      content: \"\"; width: 28px; height: 1px; background: var(--accent);\n    }\n\n    /* Tweaks panel */\n    .tweaks-panel {\n      position: fixed;\n      bottom: 20px; right: 20px;\n      width: 280px;\n      background: var(--bg-1);\n      border: 1px solid var(--line-2);\n      border-radius: 16px;\n      padding: 16px;\n      box-shadow: 0 20px 60px rgba(0,0,0,0.5);\n      z-index: 1000;\n      display: none;\n    }\n    .tweaks-panel.open { display: block; }\n    .tweaks-title {\n      font-size: 13px; font-weight: 700;\n      letter-spacing: 0.5px; text-transform: uppercase;\n      margin-bottom: 14px;\n      display: flex; justify-content: space-between; align-items: center;\n    }\n    .tweak-row { margin-bottom: 14px; }\n    .tweak-row-label {\n      font-size: 11px; color: var(--tx-3); margin-bottom: 6px;\n      text-transform: uppercase; letter-spacing: 0.5px;\n    }\n    .tweak-row-options {\n      display: flex; gap: 6px; flex-wrap: wrap;\n    }\n    .tweak-opt {\n      padding: 6px 10px; border-radius: 7px;\n      background: var(--bg-3); color: var(--tx-2);\n      border: 1px solid transparent;\n      font-size: 12px; font-weight: 600;\n      cursor: pointer; transition: all 0.15s;\n    }\n    .tweak-opt:hover { background: var(--bg-4); }\n    .tweak-opt.active {\n      background: var(--accent-soft);\n      color: var(--accent-2);\n      border-color: var(--accent);\n    }\n    .color-swatch {\n      width: 28px; height: 28px; border-radius: 50%;\n      cursor: pointer; border: 2px solid transparent;\n      transition: all 0.15s;\n    }\n    .color-swatch.active { border-color: var(--tx-1); transform: scale(1.1); }\n\n    /* Phone frame wrapper scale */\n    .phone-shelf {\n      display: flex; gap: 40px;\n      padding: 0 40px 40px;\n      overflow-x: auto;\n    }\n    .phone-shelf::-webkit-scrollbar { height: 8px; }\n    .phone-shelf::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }\n\n    .phone-cell {\n      display: flex; flex-direction: column; align-items: center;\n      gap: 14px; flex-shrink: 0;\n    }\n    .phone-cell-label {\n      font-size: 12px; color: var(--tx-3);\n      font-family: var(--font-mono);\n      letter-spacing: 0.5px;\n    }\n\n    /* Desktop frame */\n    .desk-frame {\n      width: 1200px; height: 780px;\n      margin: 0 auto;\n      border-radius: 12px;\n      overflow: hidden;\n      border: 1px solid var(--line-2);\n      box-shadow: 0 40px 100px rgba(0,0,0,0.5);\n      background: var(--bg-0);\n      position: relative;\n    }\n\n    .fab {\n      position: fixed;\n      bottom: 20px; right: 20px;\n      width: 52px; height: 52px;\n      border-radius: 50%;\n      background: var(--accent);\n      border: none;\n      display: flex; align-items: center; justify-content: center;\n      cursor: pointer;\n      box-shadow: 0 8px 24px var(--accent-glow);\n      z-index: 999;\n      color: white;\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body data-theme=\"dark\" data-accent=\"blue\" data-density=\"normal\">\n  <div id=\"root\"><\u002Fdiv>\n\n  <!-- Tweaks panel -->\n  <div class=\"tweaks-panel\" id=\"tweaks\">\n    <div class=\"tweaks-title\">\n      <span>Tweaks<\u002Fspan>\n      <button onclick=\"toggleTweaks()\" style=\"background:none;border:none;color:var(--tx-3);cursor:pointer;font-size:18px;\">×<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tweak-row\">\n      <div class=\"tweak-row-label\">AI 口吻<\u002Fdiv>\n      <div class=\"tweak-row-options\" id=\"tone-opts\">\n        <button class=\"tweak-opt active\" data-tone=\"cool\">🧊 冷靜<\u002Fbutton>\n        <button class=\"tweak-opt\" data-tone=\"teacher\">👨‍🏫 老師<\u002Fbutton>\n        <button class=\"tweak-opt\" data-tone=\"coach\">🔥 教練<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tweak-row\">\n      <div class=\"tweak-row-label\">資訊密度<\u002Fdiv>\n      <div class=\"tweak-row-options\" id=\"density-opts\">\n        <button class=\"tweak-opt active\" data-density=\"normal\">簡潔<\u002Fbutton>\n        <button class=\"tweak-opt\" data-density=\"dense\">密集<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tweak-row\">\n      <div class=\"tweak-row-label\">主色調<\u002Fdiv>\n      <div class=\"tweak-row-options\" id=\"accent-opts\">\n        <div class=\"color-swatch active\" data-accent=\"blue\" style=\"background:#5b8dff;\"><\u002Fdiv>\n        <div class=\"color-swatch\" data-accent=\"purple\" style=\"background:#a685ff;\"><\u002Fdiv>\n        <div class=\"color-swatch\" data-accent=\"green\" style=\"background:#3fd99a;\"><\u002Fdiv>\n        <div class=\"color-swatch\" data-accent=\"amber\" style=\"background:#ffb547;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tweak-row\">\n      <div class=\"tweak-row-label\">主題<\u002Fdiv>\n      <div class=\"tweak-row-options\" id=\"theme-opts\">\n        <button class=\"tweak-opt active\" data-theme=\"dark\">深色<\u002Fbutton>\n        <button class=\"tweak-opt\" data-theme=\"light\">淺色<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <button class=\"fab\" onclick=\"toggleTweaks()\" aria-label=\"Toggle tweaks\">\n    <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n      <circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle>\n      <path d=\"M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1A1.7 1.7 0 004.6 9a1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fbutton>\n\n  <script>\n    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{\n      \"tone\": \"cool\",\n

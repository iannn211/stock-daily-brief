name: Daily Brief

on:
  schedule:
    # 07:30 Taipei (UTC+8) = 23:30 UTC the previous day.
    # Taipei Mon–Fri mornings = UTC Sun–Thu 23:30.
    - cron: "30 23 * * 0-4"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Generate brief
        id: gen
        run: |
          python daily_brief.py
          echo "DATE=$(TZ=Asia/Taipei date +%Y-%m-%d)" >> "$GITHUB_ENV"
          echo "DAY=$(TZ=Asia/Taipei date +%A)" >> "$GITHUB_ENV"

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Calculate portfolio P&L
        run: python calculate_pnl.py

      - name: Generate narrative analysis (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FORCE_ANALYZE: "1"
        run: python analyze.py

      - name: Build HTML dashboard
        run: python build_dashboard.py

      - name: Commit brief + dashboard + portfolio to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add briefs/ docs/ prices.json portfolio.json analyses/
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "Daily brief ${DATE}"
            git push
          fi

      - name: Open issue with today's prompt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRIEF="briefs/${DATE}.md"
          if [ ! -f "$BRIEF" ]; then
            echo "no brief file at $BRIEF, skipping issue"
            exit 0
          fi
          gh issue create \
            --title "Daily Brief ${DATE} (${DAY})" \
            --body-file "$BRIEF" \
            --label "daily-brief" || \
          gh issue create \
            --title "Daily Brief ${DATE} (${DAY})" \
            --body-file "$BRIEF"
